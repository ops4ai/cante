# docker-compose.yml — cante, the motor.
#
# Instance isolation: set INSTANCE in .env to run several forks side-by-side on
# the same host (e.g. cante-cds for a club, cante-ops4ai for the portal). When
# INSTANCE is empty (default), everything is plain `cante*` exactly as before —
# single-instance behaviour is unchanged. When INSTANCE is set (e.g. "cds"):
#   - project name      -> cante-cds
#   - container names   -> cante-cds-postgres, cante-cds-api, ...
#   - network           -> cante-cds_net
#   - postgres volume   -> cante-cds_postgres_data  (own data, own backups)
# A second fork does NOT touch the first's containers, network, ports or data.
# A new fork = copy the repo + set a unique INSTANCE + unique host ports in .env.
#
# S4/S17: no secrets are hardcoded here — everything sensitive is read from .env
# (gitignored). Published ports bind to 127.0.0.1 so the DB, Redis, and services
# are not exposed to the public network behind the edge proxy; put Cante behind a
# reverse proxy (Traefik/nginx) for public ingress.
#
# Host ports are configurable via CANTE_<SERVICE>_PORT (default to the standard
# ports below) so several instances can each expose on a unique host port.

name: ${INSTANCE:+cante-}${INSTANCE:-cante}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${CANTE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    # S17: require a password when REDIS_PASSWORD is set; no auth in dev when empty.
    command: ["sh", "-c", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-server --requirepass \"$${REDIS_PASSWORD}\"; else redis-server; fi"]
    ports:
      - "127.0.0.1:${CANTE_REDIS_PORT:-6379}:6379"
    networks:
      - net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingress:
    build:
      context: .
      dockerfile: services/ingress/Dockerfile
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-ingress
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CANTE_INGRESS_PORT:-8001}:8001"
    networks:
      - net

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-api
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CANTE_API_PORT:-8000}:8000"
    networks:
      - net

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - net

  sender:
    build:
      context: .
      dockerfile: services/sender/Dockerfile
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-sender
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - net

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - net

  evolution:
    image: atendai/evolution-api:latest
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-evolution
    restart: unless-stopped
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - LANGUAGE=en
    ports:
      - "127.0.0.1:${CANTE_EVOLUTION_PORT:-8088}:8080"
    networks:
      - net

  mock-backend:
    build:
      context: ./examples/mock-backend
      dockerfile: Dockerfile
    container_name: ${INSTANCE:+cante-}${INSTANCE:-cante}-mock-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CANTE_MOCK_PORT:-9000}:9000"
    networks:
      - net

networks:
  net:
    name: ${INSTANCE:+cante-}${INSTANCE:-cante}_net

volumes:
  postgres_data:
    name: ${INSTANCE:+cante-}${INSTANCE:-cante}_postgres_data

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cante
          POSTGRES_PASSWORD: cante
          POSTGRES_DB: cante_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install core
        run: pip install -e core

      - name: Install services runtime deps
        # core/pyproject covers the shared deps; services/ additionally needs
        # fastapi/uvicorn/apscheduler (see services/*/Dockerfile). Without these
        # the API tests error with ModuleNotFoundError and coverage drops <50%.
        run: pip install fastapi uvicorn apscheduler

      - name: Install dev deps
        run: pip install pytest pytest-asyncio pytest-cov ruff mypy httpx fakeredis

      - name: Lint
        run: make lint

      - name: Test
        run: make test
        env:
          DATABASE_URL: postgresql+asyncpg://cante:cante@localhost:5432/cante_test
          JWT_SECRET: ci-test-jwt-secret
          ADMIN_EMAIL: admin@ci.test
          ADMIN_PASSWORD: ci-test-password
          TRIGGER_API_KEY: ci-test-trigger-key
          WORKER_LLM_ENABLED: "false"
          SECRET_ENCRYPTION_KEY: "aW5zZWN1cmUtdGVzdC1rZXktZm9yLUNJLTAwMDA="

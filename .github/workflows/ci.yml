name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cante
          POSTGRES_PASSWORD: cante
          POSTGRES_DB: cante
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd core && pip install -e ".[dev]"
      - name: Lint
        run: |
          cd core && ruff check cante/ && mypy cante/
      - name: Test
        run: |
          cd core && pytest -v --cov=cante --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://cante:cante@localhost:5432/cante
          REDIS_URL: redis://localhost:6379/0

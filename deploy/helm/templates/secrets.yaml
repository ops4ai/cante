apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  # S4: refuse to render with empty/default secrets — `helm install` fails fast.
  jwtSecret: {{ required "secrets.jwtSecret must be set (generate with: python -c \"import secrets; print(secrets.token_urlsafe(48))\")" .Values.secrets.jwtSecret | quote }}
  encryptionKey: {{ required "secrets.encryptionKey must be a valid Fernet key (generate with: python -c \"from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())\")" .Values.secrets.encryptionKey | quote }}
  anthropicApiKey: {{ .Values.secrets.anthropicApiKey | quote }}
  triggerApiKey: {{ required "secrets.triggerApiKey must be set (separate from jwtSecret)" .Values.secrets.triggerApiKey | quote }}
  adminPassword: {{ required "secrets.adminPassword must be set" .Values.secrets.adminPassword | quote }}

[pytest]
# Run the whole suite from the repo root (C20): both the shared `tests/` dir
# and `core/tests/`. pythonpath puts the repo root + core/ on sys.path so
# `import cante`, `from services...`, and `from tests...` all resolve.
asyncio_mode = auto
pythonpath = . core
testpaths = tests core/tests
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning:alembic.*
